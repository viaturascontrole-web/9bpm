<title>Garageiro — 9º BPM</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --blue-dark:   #0d47a1;
  --blue-mid:    #1565c0;
  --blue-light:  #1e88e5;
  --blue-pale:   #42a5f5;
  --blue-bg:     #29b6f6;
  --panel-bg:    #1a3a5c;
  --panel-dark:  #0f2540;
  --white:       #ffffff;
  --input-bg:    #ffffff;
  --input-border:#90caf9;
  --btn-bg:      #64d1e8;
  --btn-hover:   #4fc3d9;
  --text-main:   #ffffff;
  --text-sub:    #b3d9f7;
  --accent:      #fdd835;
  --red:         #ef5350;
  --green:       #66bb6a;
  --orange:      #ffa726;
  --font:        'Roboto', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: linear-gradient(135deg, #0d47a1 0%, #1565c0 30%, #1e88e5 60%, #29b6f6 100%);
  overflow: hidden;
  position: relative;
}

/* ── padrão xadrez decorativo (estilo SIGA) ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 20px,
      transparent 20px,
      transparent 40px
    );
  pointer-events: none;
  z-index: 0;
}

/* ── diagonal decorativa (estilo SIGA) ── */
.deco-diagonal {
  position: fixed;
  top: 0; left: 0;
  width: 55%;
  height: 100%;
  clip-path: polygon(0 0, 78% 0, 52% 100%, 0 100%);
  background: rgba(255,255,255,0.06);
  pointer-events: none;
  z-index: 0;
}

/* ── layout central ── */
.page-center {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── card de login ── */
.card {
  background: var(--panel-dark);
  border-radius: 12px;
  padding: 36px 32px 28px;
  width: 100%;
  max-width: 380px;
  box-shadow:
    0 24px 64px rgba(0,0,0,0.45),
    0 4px 16px rgba(0,0,0,0.3);
  animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  position: relative;
  overflow: hidden;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* barra de cor no topo do card */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--blue-pale), var(--btn-bg));
}

/* ── logo dentro do card ── */
.card-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
  gap: 10px;
}

.card-logo-img {
  width: 88px;
  height: auto;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

.card-system-name {
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.card-system-name span {
  color: var(--btn-bg);
}

.card-system-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-sub);
  letter-spacing: 3px;
  text-transform: uppercase;
  background: rgba(100,209,232,0.12);
  border: 1px solid rgba(100,209,232,0.25);
  padding: 3px 12px;
  border-radius: 20px;
}

/* ── barra de lockout ── */
.lockout-bar { display:none; height:3px; background:rgba(239,83,80,.15); border-radius:2px; margin-bottom:14px; overflow:hidden; }
.lockout-bar.on { display:block; }
.lockout-progress { height:100%; background:linear-gradient(90deg,var(--red),#c62828); transition:width 1s linear; }

/* ── mensagem ── */
.msg { display:none; padding:10px 13px; border-radius:6px; font-size:12px; margin-bottom:14px; animation:msgIn .2s ease; line-height:1.5; }
@keyframes msgIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.msg.err  { background:rgba(239,83,80,.12); border:1px solid rgba(239,83,80,.3); color:#ff8a80; }
.msg.ok   { background:rgba(100,209,232,.10); border:1px solid rgba(100,209,232,.3); color:var(--btn-bg); }
.msg.warn { background:rgba(253,216,53,.10); border:1px solid rgba(253,216,53,.3); color:var(--accent); }
.msg.on   { display:block; }

/* ── spinner ── */
.spin-wrap { display:none; align-items:center; justify-content:center; gap:10px; padding:6px 0 10px; }
.spin-wrap.on { display:flex; }
.spin { width:18px; height:18px; border:2px solid rgba(255,255,255,.15); border-top-color:var(--btn-bg); border-radius:50%; animation:rot 1s linear infinite; }
@keyframes rot { to{transform:rotate(360deg)} }
.spin-lbl { font-size:11px; color:var(--text-sub); letter-spacing:1px; }

/* ── campos ── */
.fgrp {
  margin-bottom: 14px;
}

.finp-wrap {
  position: relative;
  display: flex;
  align-items: center;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: 6px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}

.finp-wrap:focus-within {
  border-color: var(--blue-pale);
  box-shadow: 0 0 0 3px rgba(66,165,245,0.2);
}

.finp {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  padding: 13px 14px 13px 14px;
  font-family: var(--font);
  font-size: 14px;
  color: #1a1a2e;
  letter-spacing: 0.5px;
}

.finp::placeholder {
  color: #90a4ae;
  font-weight: 400;
}

.finp.upper { text-transform: uppercase; }

.ico-side {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 100%;
  background: #e3f2fd;
  color: #1565c0;
  font-size: 16px;
  flex-shrink: 0;
  align-self: stretch;
  border-right: 1px solid #bbdefb;
}

.toggle-pw {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 12px;
  color: #78909c;
  font-size: 15px;
  line-height: 1;
  transition: color .2s;
}

.toggle-pw:hover { color: var(--blue-mid); }
.toggle-pw:disabled { opacity:.4; cursor:not-allowed; }

/* ── botões ── */
.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--btn-bg), #26c6da);
  border: none;
  border-radius: 6px;
  color: #0d47a1;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 6px;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(100,209,232,0.3);
}

.btn-login:hover {
  background: linear-gradient(135deg, #4fc3d9, #00bcd4);
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(100,209,232,0.45);
}

.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

.btn-acesso {
  display: none;
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #43a047, #2e7d32);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 10px;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(67,160,71,0.3);
}

.btn-acesso:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(67,160,71,0.4); }
.btn-acesso.on { display: block; }

/* ── link esqueceu senha ── */
.forgot {
  text-align: center;
  margin-top: 16px;
}

.forgot a {
  font-size: 12px;
  color: var(--btn-bg);
  text-decoration: none;
  transition: color .2s;
}

.forgot a:hover { color: var(--white); text-decoration: underline; }



/* responsive */
@media (max-width: 480px) {
  .card { padding: 28px 20px 22px; margin: 0 12px; }
}
</style>

<script>
(function () {
'use strict';

// ═══════════════════════════════════════════════════════════════
//  [SEC-00] CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════════════
var _API_URL = 'https://script.google.com/macros/s/AKfycbyQl3ns6drVY1H2DepxCfN23Zee3xmcVlsP4a47IMPlfhxIPGHveaI3-EGYZ7gyVwbooA/exec';

// ═══════════════════════════════════════════════════════════════
//  [SEC-02] RATE LIMITING
// ═══════════════════════════════════════════════════════════════
var _tentativas   = 0;
var _bloqueadoAte = 0;
var _lockoutTimer = null;
var MAX_TENT      = 5;
var BACKOFF_MS    = [0, 0, 30000, 60000, 120000];

function _getBloqueioRestante() { return Math.max(0, _bloqueadoAte - Date.now()); }
function _isBloqueado() { return _getBloqueioRestante() > 0; }

function _registrarFalha() {
  _tentativas++;
  var espera = _tentativas < BACKOFF_MS.length ? BACKOFF_MS[_tentativas] : 300000;
  if (espera > 0) {
    _bloqueadoAte = Date.now() + espera;
    _iniciarCountdown(espera);
  }
}

function _registrarSucesso() {
  _tentativas   = 0;
  _bloqueadoAte = 0;
  clearInterval(_lockoutTimer);
  document.getElementById('lockoutBar').classList.remove('on');
}

function _iniciarCountdown(duracao) {
  clearInterval(_lockoutTimer);
  var bar  = document.getElementById('lockoutBar');
  var prog = document.getElementById('lockoutProgress');
  bar.classList.add('on');
  _lockoutTimer = setInterval(function () {
    var restante = _getBloqueioRestante();
    if (restante <= 0) {
      clearInterval(_lockoutTimer);
      bar.classList.remove('on');
      document.getElementById('msgBox').className = 'msg';
      document.getElementById('btnLogin').disabled = false;
      return;
    }
    var pct = (restante / duracao) * 100;
    prog.style.width = pct.toFixed(1) + '%';
    var seg = Math.ceil(restante / 1000);
    _showMsg('🔒 Muitas tentativas. Aguarde ' + seg + 's.', 'err');
    document.getElementById('btnLogin').disabled = true;
  }, 500);
}

// ═══════════════════════════════════════════════════════════════
//  [SEC-04] ESTADO PRIVADO
// ═══════════════════════════════════════════════════════════════
var _urlDashboard   = '';
var _acessoLiberado = false;

// ═══════════════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', function () {
  var tk     = sessionStorage.getItem('gar_token');
  var mat    = sessionStorage.getItem('gar_matricula');
  var expira = parseInt(sessionStorage.getItem('gar_expira') || '0', 10);

  if (tk && mat) {
    if (Date.now() < expira) {
      window.location.href = 'garageiro.html';
      return;
    }
    _limparSessao();
  }

  document.getElementById('iMat').focus();

  document.getElementById('btnLogin').addEventListener('click', fazerLogin);
  document.getElementById('btnAcesso').addEventListener('click', irParaDashboard);
  document.getElementById('btnTogglePw').addEventListener('click', toggleSenha);

  document.getElementById('iMat').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('iSenha').focus(); }
  });
  document.getElementById('iSenha').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); fazerLogin(); }
  });
});

// ═══════════════════════════════════════════════════════════════
//  [SEC-10] LIMPA SENHA AO MINIMIZAR
// ═══════════════════════════════════════════════════════════════
window.addEventListener('visibilitychange', function () {
  if (document.visibilityState === 'hidden' && !_acessoLiberado) {
    var inp = document.getElementById('iSenha');
    if (inp) inp.value = '';
  }
});

// ═══════════════════════════════════════════════════════════════
//  HELPERS UI
// ═══════════════════════════════════════════════════════════════
function toggleSenha() {
  var inp = document.getElementById('iSenha');
  var btn = document.getElementById('btnTogglePw');
  if (inp.disabled) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.setAttribute('aria-label', inp.type === 'password' ? 'Mostrar senha' : 'Ocultar senha');
}

function _showMsg(texto, tipo) {
  var el = document.getElementById('msgBox');
  el.textContent = texto;
  el.className = 'msg ' + tipo + ' on';
}

function _setLoading(on, txt) {
  document.getElementById('spinWrap').classList.toggle('on', on);
  document.getElementById('spinLbl').textContent = txt || 'AUTENTICANDO...';
  document.getElementById('btnLogin').disabled    = on || _isBloqueado();
  document.getElementById('iMat').disabled        = on;
  document.getElementById('iSenha').disabled      = on;
  document.getElementById('btnTogglePw').disabled = on;
}

function irParaDashboard() {
  if (!_acessoLiberado || !_urlDashboard) {
    _showMsg('✗ Sessão inválida. Faça login novamente.', 'err');
    return;
  }
  _acessoLiberado = false;
  var destino = _urlDashboard;
  _urlDashboard = '';
  window.location.href = destino;
}

// ═══════════════════════════════════════════════════════════════
//  CHAMADA À API
// ═══════════════════════════════════════════════════════════════
async function _api(payload) {
  var ctrl  = new AbortController();
  var timer = setTimeout(function () { ctrl.abort(); }, 15000);
  try {
    var resp = await fetch(_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
      signal: ctrl.signal,
      credentials: 'omit',
      referrerPolicy: 'no-referrer'
    });
    if (!resp.ok) throw new Error('HTTP_' + resp.status);
    return resp.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('TIMEOUT');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

function _msgErro(e) {
  if (!e || !e.message) return 'Erro de conexão. Tente novamente.';
  if (e.message === 'TIMEOUT')       return 'Tempo limite esgotado. Verifique a conexão.';
  if (e.message.startsWith('HTTP_')) return 'Falha no servidor (' + e.message + '). Tente mais tarde.';
  if (e instanceof TypeError)        return 'Sem conexão com o servidor. Verifique a internet.';
  return 'Erro de conexão. Tente novamente.';
}

// ═══════════════════════════════════════════════════════════════
//  [SEC-03] VALIDAÇÃO
// ═══════════════════════════════════════════════════════════════
function _validarInputs(matricula, senha) {
  if (!matricula || !matricula.trim()) return '⚠ Informe sua matrícula.';
  if (matricula.trim().length > 20)   return '⚠ Matrícula muito longa.';
  if (!senha)                         return '⚠ Informe sua senha.';
  if (senha.length < 4)               return '⚠ Senha muito curta (mín. 4 caracteres).';
  if (senha.length > 64)              return '⚠ Senha muito longa.';
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════════════
async function fazerLogin() {
  if (_isBloqueado()) return;

  var matricula = document.getElementById('iMat').value.trim().toUpperCase();
  var senha     = document.getElementById('iSenha').value;

  document.getElementById('msgBox').className = 'msg';

  var erroValidacao = _validarInputs(matricula, senha);
  if (erroValidacao) { _showMsg(erroValidacao, 'warn'); return; }

  _setLoading(true, 'AUTENTICANDO...');

  try {
    var loginResult = await _api({
      tipo: 'garageiroLogin',
      matricula: matricula,
      senha: senha
    });

    if (!loginResult || !loginResult.sucesso) {
      _registrarFalha();
      _setLoading(false);
      _showMsg('✗ Credenciais inválidas. Verifique e tente novamente.', 'err');
      document.getElementById('iSenha').value = '';
      document.getElementById('iSenha').focus();
      return;
    }

    _registrarSucesso();
    _showMsg('✓ ' + (loginResult.mensagem || 'Autenticado com sucesso.'), 'ok');
    _setLoading(true, 'PREPARANDO ACESSO...');

    var token      = loginResult.token;
    var nomeGuerra = loginResult.nomeGuerra;
    var mat        = loginResult.matricula;
    var perfil     = loginResult.perfil;

    var hkResult = await _api({
      tipo: 'garageiroHandoff',
      token: token,
      matricula: mat,
      nomeGuerra: nomeGuerra,
      perfil: perfil
    });

    _setLoading(false);
    _salvarSessao(token, mat, nomeGuerra, perfil);

    if (hkResult && hkResult.handoffKey) {
      _urlDashboard = 'garageiro.html?hk=' + encodeURIComponent(hkResult.handoffKey);
    } else {
      _urlDashboard = 'garageiro.html';
    }

    _acessoLiberado = true;

    document.getElementById('btnLogin').style.display = 'none';
    var btnAcesso = document.getElementById('btnAcesso');
    btnAcesso.classList.add('on');
    btnAcesso.focus();

  } catch (e) {
    _setLoading(false);
    _showMsg('✗ ' + _msgErro(e), 'err');
  }
}

// ═══════════════════════════════════════════════════════════════
//  [SEC-05] GESTÃO DE SESSÃO
// ═══════════════════════════════════════════════════════════════
function _salvarSessao(token, matricula, nomeGuerra, perfil) {
  var OITO_HORAS = 8 * 60 * 60 * 1000;
  sessionStorage.setItem('gar_token',      token);
  sessionStorage.setItem('gar_matricula',  matricula);
  sessionStorage.setItem('gar_nomeGuerra', nomeGuerra);
  sessionStorage.setItem('gar_perfil',     perfil);
  sessionStorage.setItem('gar_expira',     String(Date.now() + OITO_HORAS));
}

function _limparSessao() {
  ['gar_token','gar_matricula','gar_nomeGuerra','gar_perfil','gar_expira']
    .forEach(function (k) { sessionStorage.removeItem(k); });
}

window.irParaDashboard = irParaDashboard;
window.toggleSenha     = toggleSenha;

}());
