<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="9º BPM">
<meta name="theme-color" content="#00c9a7">
<meta name="description" content="Controle de viaturas do 9º BPM">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>9º BPM — Controle de Viaturas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;background:#0a0e1a;color:#e2e8f0;
  font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,201,167,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,201,167,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.layout{
  position:relative;z-index:1;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-evenly;
  padding:24px 24px 20px;
}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.logo{
  width:190px;height:190px;border-radius:50%;
  border:4px solid rgba(0,201,167,.5);
  box-shadow:0 0 0 10px rgba(0,201,167,.06),0 0 50px rgba(0,201,167,.2);
  object-fit:cover;display:block;
}
.titulo{font-size:40px;font-weight:900;letter-spacing:5px;color:#e2e8f0;text-align:center;line-height:1}
.titulo span{color:#00c9a7}
.subtitulo{font-size:11px;color:#8ea0b5;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);
  border-radius:999px;padding:5px 14px;
  font-size:10px;color:#00c9a7;letter-spacing:1.5px;text-transform:uppercase;margin-top:10px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:#00c9a7;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,201,167,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,201,167,0)}}
.botoes{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}
.btn{
  display:flex;align-items:center;padding:0 20px;height:78px;
  border:none;border-radius:18px;cursor:pointer;text-decoration:none;
  font-family:inherit;transition:transform .15s;gap:16px;
}
.btn:active{transform:scale(.97)}
.btn-entrada{
  background:linear-gradient(135deg,#0a2a20,#0d3328);
  border:2px solid rgba(0,201,167,.4);
  box-shadow:0 4px 24px rgba(0,201,167,.12);
}
.btn-saida{
  background:linear-gradient(135deg,#1a0a28,#220d35);
  border:2px solid rgba(192,132,252,.4);
  box-shadow:0 4px 24px rgba(192,132,252,.12);
}
.btn-icon{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.btn-entrada .btn-icon{background:rgba(0,201,167,.12)}
.btn-saida   .btn-icon{background:rgba(192,132,252,.12)}
.btn-texto{text-align:left;flex:1}
.btn-titulo{font-size:18px;font-weight:700;line-height:1;margin-bottom:4px}
.btn-entrada .btn-titulo{color:#00c9a7}
.btn-saida   .btn-titulo{color:#c084fc}
.btn-sub{font-size:12px;color:#8ea0b5}
.btn-arrow{font-size:22px;color:#253548;flex-shrink:0}
.footer{font-size:10px;color:#2a4060;letter-spacing:1px;text-align:center;text-transform:uppercase}
</style>
</head>
